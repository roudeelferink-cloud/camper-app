<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Camper Compagnon</title>
  <meta name="description" content="Voorraad, paklijsten en reisadvies voor de camper. Alle data lokaal op je toestel.">
  <meta name="theme-color" content="#f7f5f0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Camper">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 id="screen-title">Voorraad</h1>
    </header>
    <main id="main" tabindex="-1"></main>
    <nav class="tabbar" aria-label="Hoofdnavigatie">
      <button class="tab" data-tab="voorraad" aria-label="Voorraad">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7.5 12 3l8 4.5v9L12 21l-8-4.5v-9Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M4 7.5 12 12l8-4.5M12 12v9" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
        <span>Voorraad</span>
        <span class="tab-badge" id="badge-voorraad" hidden></span>
      </button>
      <button class="tab" data-tab="wensen" aria-label="Wensen">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20s-7-4.3-9-9c-1.2-2.9.6-6 3.7-6 1.9 0 3.4 1 4.3 2.6h2C13.9 6 15.4 5 17.3 5c3.1 0 4.9 3.1 3.7 6-2 4.7-9 9-9 9Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" transform="translate(0,-1)"/></svg>
        <span>Wensen</span>
      </button>
      <button class="tab" data-tab="reizen" aria-label="Reizen">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="m15.5 8.5-2 5-5 2 2-5 5-2Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
        <span>Reizen</span>
      </button>
      <button class="tab" data-tab="lijsten" aria-label="Lijsten">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h12M8 12h12M8 18h12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="m3.5 5.5 1 1 2-2M3.5 11.5l1 1 2-2M3.5 17.5l1 1 2-2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Lijsten</span>
      </button>
      <button class="tab" data-tab="instellingen" aria-label="Instellingen">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M12 2.8v2.4M12 18.8v2.4M21.2 12h-2.4M5.2 12H2.8M18.5 5.5l-1.7 1.7M7.2 16.8l-1.7 1.7M18.5 18.5l-1.7-1.7M7.2 7.2 5.5 5.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        <span>⚙</span>
      </button>
    </nav>
    <div id="sheet-backdrop" class="sheet-backdrop" hidden></div>
    <div id="sheet" class="sheet" role="dialog" aria-modal="true" hidden></div>
    <div id="toast" class="toast" role="status" hidden></div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
